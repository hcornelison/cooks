# Site settings
title: Recipes
email: me@hcornelison.dev
description: An amazing recipe database!
start_url: "https://recipes.hcornelison.dev/index.html"

#comment out while debugging locally
baseurl: "https://recipes.hcornelison.dev"

#uncomment for local debugging!
#baseurl: "" 
language: "en"
lang_direction: "ltr"
github_username:  hcornelison

# Template colors used site-wide via css
colors:
  dark-mode:
    background-color: "#1A2318"
    primary-text-color: "#F5EFE7"
    secondary-text-color: "#7A9E7E"
    link-color: "#E8936A"
    menu-color: "#111D10"
    accent-color: "#243322"
  light-mode:
    background-color: "#F5EFE7"
    primary-text-color: "#2D4A2D"
    secondary-text-color: "#7A9E7E"
    link-color: "#B5541F"
    menu-color: "#2D4A2D"
    accent-color: "#E8DDD0"

# Build settings
markdown: kramdown

permalink: /:title:output_ext

collections:
  components:
    output: true
  recipes:
    output: true

exclude: ['Gemfile', 'Gemfile.lock', 'Rakefile', 'README.md']

translation:
  en:
    components: "Components"
    ingredients: "Ingredients"
    directions: "Directions"
    category: "Category"
    categories: "Categories"
    nutritional_information: "Nutritional Information"
    component_based: '<strong class="preffered-color">This is a component based recipe, follow all of the steps!</strong>'
    search: "Search"
    subscribe: "Subscribe"
    theme: "Theme"
    notes: "Notes"
    yield: "Servings:"
    preptime: "Prep Time:"
    cooktime: "Cooking Time:"
