---
layout: default
---

<div class="search container max-width-2">
	<div id="search-container">
		<h2 class="center mb3 preffered-color">Recipe Search</h2>
		<input type="text" id="search-input" placeholder="Search titles or ingredients...">
	</div>
</div>

<div class="recipes xs-px2 xs-mt2">
<div class="clearfix" id="results-container">

</div>
</div>

<script src="{{site.baseurl}}/plugins/simple-jekyll-search.min.js" type="text/javascript"></script>

<script>
SimpleJekyllSearch({
  searchInput: document.getElementById('search-input'),
  resultsContainer: document.getElementById('results-container'),
  json: '{{site.baseurl}}/search.json',
  searchResultTemplate: '<div class="xs-col sm-col xs-col-6 sm-col-4 md-col-4 lg-col-3 xl-col-2 xs-px1 xs-mb2"><a class="block bg-preffered" href="{url}"><div class="image ratio bg-cover" style="background-image:url({image});"></div><h1 class="title p1 m0"><span class="title-text">{title}</span></h1></a></div>'
})
</script>

<script>
	$( document ).ready(function() {
    $('#search-input').on('input', function() {
    	currentHeight = $('#search-container').outerHeight();
      $('.search').addClass('used').css('height', currentHeight);
	});
	});
	
</script>
