name: Astro PR Build

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit
      - name: Run e2e tests
        run: npm run test:e2e
      - name: Build
        run: npm run build
