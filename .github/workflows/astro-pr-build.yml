name: Astro PR Build

on:
  pull_request:
    branches: ["main"]
    paths:
      - "astro-site/**"
      - ".github/workflows/astro-pr-build.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: astro-site
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: astro-site/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
